<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2ASICYA Real-Time 3D Grid</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0e27; color: #e0e6ed; font-family: Arial, sans-serif; }
    #ui { position: absolute; top: 12px; left: 12px; z-index: 10; background: rgba(17,24,51,0.9); padding: 10px 12px; border-radius: 8px; }
    #ui input { width: 360px; }
    #stats { margin-top: 6px; font-size: 12px; color: #9fb0c2; }
    #kpiPanel {
      position: absolute;
      top: 132px;
      left: 12px;
      right: 12px;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(5, minmax(140px, 1fr));
      gap: 8px;
    }
    .kpi {
      background: rgba(17,24,51,0.86);
      border: 1px solid rgba(71, 166, 255, 0.35);
      border-radius: 8px;
      padding: 8px 10px;
      min-height: 56px;
    }
    .kpi-label { font-size: 10px; color: #8fa6be; text-transform: uppercase; letter-spacing: 0.06em; }
    .kpi-value { margin-top: 5px; font-size: 22px; font-weight: 700; color: #34d399; line-height: 1.1; }
    #statusValue { color: #34d399; }
    #riskPanel {
      position: absolute;
      top: 206px;
      right: 12px;
      z-index: 10;
      background: rgba(17,24,51,0.9);
      border: 1px solid rgba(71, 166, 255, 0.35);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      min-width: 170px;
    }
    #riskBadge {
      display: inline-block;
      margin-top: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      background: #0ea5e9;
      color: #06111f;
    }
    #trendPanel {
      position: absolute;
      top: 206px;
      left: 12px;
      z-index: 10;
      background: rgba(17,24,51,0.9);
      border: 1px solid rgba(71, 166, 255, 0.35);
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 260px;
    }
    #trendTitle { font-size: 11px; color: #9fb0c2; margin-bottom: 6px; }
    #trendCanvas { display: block; width: 280px; height: 60px; border-radius: 4px; background: rgba(255,255,255,0.03); }
    #legend { position: absolute; bottom: 12px; left: 12px; z-index: 10; background: rgba(17,24,51,0.9); padding: 10px 12px; border-radius: 8px; font-size: 12px; }
    .chip { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <div><strong>Real-Time 3D Grid</strong></div>
    <div style="margin-top:6px;">
      WebSocket URL:
      <input id="wsUrl" value="wss://YOUR-RENDER-APP.onrender.com/ws" aria-label="WebSocket URL" />
      <button id="connectBtn">Connect</button>
    </div>
    <div style="margin-top:6px;">
      Scenario:
      <select id="scenario" aria-label="Scenario selector">
        <option>S1</option><option>S2</option><option>S3</option><option>S4</option><option>S5</option>
      </select>
      <button id="setScenario">Apply</button>
    </div>
    <div id="stats">Disconnected</div>
  </div>
  <div id="kpiPanel">
    <div class="kpi"><div class="kpi-label">Grid Frequency</div><div id="freqValue" class="kpi-value">50.00 Hz</div></div>
    <div class="kpi"><div class="kpi-label">Installed PV</div><div id="pvValue" class="kpi-value">3.0 MW</div></div>
    <div class="kpi"><div class="kpi-label">Grid Buses</div><div id="busValue" class="kpi-value">33</div></div>
    <div class="kpi"><div class="kpi-label">Peak Loading</div><div id="peakValue" class="kpi-value">0.0%</div></div>
    <div class="kpi"><div class="kpi-label">Grid Status</div><div id="statusValue" class="kpi-value">NORMAL</div></div>
  </div>
  <div id="trendPanel">
    <div id="trendTitle">Live trend (Max Loading %)</div>
    <canvas id="trendCanvas" width="280" height="60"></canvas>
  </div>
  <div id="riskPanel">
    <div>Risk Level</div>
    <span id="riskBadge">LOW</span>
  </div>
  <div id="legend">
    <div><span class="chip" style="background:#00c853;"></span>Voltage OK</div>
    <div><span class="chip" style="background:#ffaa00;"></span>Voltage Warning</div>
    <div><span class="chip" style="background:#ff4444;"></span>Voltage Critical</div>
    <div style="margin-top:6px;"><span class="chip" style="background:#1e90ff;"></span>Line Load &lt; 80%</div>
    <div><span class="chip" style="background:#ffaa00;"></span>Line Load 80–100%</div>
    <div><span class="chip" style="background:#ff4444;"></span>Line Load &gt; 100%</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    const statsEl = document.getElementById('stats');
    const freqValueEl = document.getElementById('freqValue');
    const pvValueEl = document.getElementById('pvValue');
    const busValueEl = document.getElementById('busValue');
    const peakValueEl = document.getElementById('peakValue');
    const statusValueEl = document.getElementById('statusValue');
    const riskBadgeEl = document.getElementById('riskBadge');
    const trendCanvas = document.getElementById('trendCanvas');
    const trendCtx = trendCanvas.getContext('2d');
    let socket;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    let manualDisconnect = false;
    const maxLoadingHistory = [];

    function getWsFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const ws = params.get('ws');
      return ws ? decodeURIComponent(ws) : null;
    }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 20, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 8;
    controls.maxDistance = 80;
    controls.maxPolarAngle = Math.PI / 2.1;

    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(10, 20, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // Ground plane (simple terrain)
    const groundGeo = new THREE.PlaneGeometry(80, 80, 1, 1);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x0f1a33, roughness: 0.9, metalness: 0.1 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Substation marker
    const subGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
    const subMat = new THREE.MeshStandardMaterial({ color: 0x8899aa });
    const substation = new THREE.Mesh(subGeo, subMat);
    substation.position.set(0, 0.6, 0);
    scene.add(substation);

    const nodes = new Map();
    const lines = [];
    let tick = 0;
    let lastPayload = null;
    const heatPoints = [];
    let attackVisualIntensity = 0;

    function getScenarioSeverity(scenario) {
      const map = { S1: 0.12, S2: 0.25, S3: 0.40, S4: 0.60, S5: 0.85 };
      return map[scenario] || 0.10;
    }

    function estimateRisk(stats) {
      const maxLoading = stats.max_line_loading || 0;
      const minV = stats.min_vm || 1.0;
      const maxV = stats.max_vm || 1.0;
      const vSpread = Math.abs(maxV - minV);
      if (maxLoading > 100 || minV < 0.94 || vSpread > 0.08) return { label: "CRITICAL", bg: "#ef4444", fg: "#210707" };
      if (maxLoading > 80 || minV < 0.97 || vSpread > 0.05) return { label: "HIGH", bg: "#f59e0b", fg: "#201304" };
      if (maxLoading > 60 || minV < 0.985 || vSpread > 0.03) return { label: "MEDIUM", bg: "#22c55e", fg: "#06210e" };
      return { label: "LOW", bg: "#38bdf8", fg: "#041a25" };
    }

    function updateTrend(value) {
      maxLoadingHistory.push(value);
      if (maxLoadingHistory.length > 36) maxLoadingHistory.shift();
      trendCtx.clearRect(0, 0, trendCanvas.width, trendCanvas.height);
      trendCtx.strokeStyle = "#1e90ff";
      trendCtx.lineWidth = 2;
      trendCtx.beginPath();
      maxLoadingHistory.forEach((v, i) => {
        const x = (i / Math.max(maxLoadingHistory.length - 1, 1)) * (trendCanvas.width - 8) + 4;
        const y = trendCanvas.height - 4 - Math.min(v, 120) / 120 * (trendCanvas.height - 8);
        if (i === 0) trendCtx.moveTo(x, y);
        else trendCtx.lineTo(x, y);
      });
      trendCtx.stroke();
    }

    function makeTextSprite(text) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.font = '24px Arial';
      const width = ctx.measureText(text).width + 20;
      canvas.width = width;
      canvas.height = 40;
      ctx.font = '24px Arial';
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e0e6ed';
      ctx.fillText(text, 10, 28);
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(3, 1, 1);
      return sprite;
    }

    function createGrid(buses, lineData) {
      nodes.forEach(n => scene.remove(n));
      lines.forEach(l => { scene.remove(l.line); scene.remove(l.marker); });
      heatPoints.forEach(h => scene.remove(h.mesh));
      nodes.clear();
      lines.length = 0;
      heatPoints.length = 0;

      const n = buses.length;
      const radius = 10;

      buses.forEach((b, i) => {
        const angle = (i / n) * Math.PI * 2;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const geo = new THREE.SphereGeometry(0.3, 16, 16);
        const mat = new THREE.MeshStandardMaterial({ color: 0x00d4ff });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, 0, z);
        scene.add(mesh);
        const label = makeTextSprite(b.name || `Bus ${b.bus_id}`);
        label.position.set(x, 0.9, z);
        scene.add(label);
        const heatGeo = new THREE.CircleGeometry(0.8, 24);
        const heatMat = new THREE.MeshBasicMaterial({ color: 0x00c853, transparent: true, opacity: 0.25 });
        const heat = new THREE.Mesh(heatGeo, heatMat);
        heat.rotation.x = -Math.PI / 2;
        heat.position.set(x, 0.02, z);
        scene.add(heat);

        // PV panel or load icon (simple)
        let icon = null;
        if (i % 5 === 0) {
          const pvGeo = new THREE.PlaneGeometry(0.9, 0.6);
          const pvMat = new THREE.MeshStandardMaterial({ color: 0x00d4ff, side: THREE.DoubleSide });
          icon = new THREE.Mesh(pvGeo, pvMat);
          icon.rotation.x = -Math.PI / 4;
          icon.position.set(x, 0.4, z);
          scene.add(icon);
        } else if (i % 5 === 1) {
          const loadGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
          const loadMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
          icon = new THREE.Mesh(loadGeo, loadMat);
          icon.position.set(x, 0.25, z);
          scene.add(icon);
        }

        nodes.set(b.bus_id, { mesh, label, heat, icon, baseColor: 0x00d4ff });
        heatPoints.push({ mesh: heat });
      });

      lineData.forEach(l => {
        const a = nodes.get(l.from_bus)?.mesh.position;
        const b = nodes.get(l.to_bus)?.mesh.position;
        if (!a || !b) return;
        const points = [a.clone(), b.clone()];
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const mat = new THREE.LineBasicMaterial({ color: 0x1e90ff, linewidth: 1 });
        const line = new THREE.Line(geo, mat);
        scene.add(line);
        const markerGeo = new THREE.SphereGeometry(0.12, 10, 10);
        const markerMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.position.copy(a);
        scene.add(marker);
        lines.push({ line, marker, a: a.clone(), b: b.clone(), load: 0, phase: Math.random() });
      });
    }

    function updateGrid(payload) {
      const { buses, lines: lineData, stats, timestamp, scenario, fleet_multiplier } = payload;

      // Defensive guard: backend may send non-visual messages (info/error) on init.
      if (!buses || !lineData || !stats) {
        if (payload && payload.type === "error") {
          statsEl.textContent = `Simulation error: ${payload.error || "unknown error"}`;
        } else if (payload && payload.type === "info") {
          statsEl.textContent = payload.message ? `Status: ${payload.message}` : "Status update";
        } else {
          statsEl.textContent = "Waiting for simulation data...";
        }
        return;
      }

      if (nodes.size === 0) {
        createGrid(buses, lineData);
      }

      const scenarioSeverity = getScenarioSeverity(scenario);
      const affectedBusCount = Math.max(1, Math.floor(buses.length * scenarioSeverity));
      buses.forEach((b, idx) => {
        const node = nodes.get(b.bus_id);
        if (!node) return;
        const v = b.vm_pu;
        const isScenarioAffected = idx < affectedBusCount;
        let color = v < 0.95 ? 0xff4444 : v > 1.05 ? 0xffaa00 : 0x00c853;
        if (isScenarioAffected) {
          color = scenarioSeverity >= 0.60 ? 0xff2d2d : scenarioSeverity >= 0.40 ? 0xff7a1a : 0xffb020;
        }
        node.mesh.material.color.setHex(color);
        node.heat.material.color.setHex(color);
        node.heat.material.opacity = isScenarioAffected ? Math.min(0.70, 0.25 + scenarioSeverity * 0.6) : (v < 0.95 ? 0.45 : v > 1.05 ? 0.35 : 0.25);
      });

      const affectedLineCount = Math.max(1, Math.floor(lineData.length * scenarioSeverity));
      lineData.forEach((l, i) => {
        if (!lines[i]) return;
        const loading = l.loading;
        const isScenarioAffected = i < affectedLineCount;
        let color = loading > 100 ? 0xff4444 : loading > 80 ? 0xffaa00 : 0x1e90ff;
        if (isScenarioAffected) {
          color = scenarioSeverity >= 0.60 ? 0xff4444 : scenarioSeverity >= 0.40 ? 0xff8c1a : 0xffc33a;
        }
        lines[i].line.material.color.setHex(color);
        lines[i].marker.material.color.setHex(color);
        lines[i].load = loading;
        // emulate thickness by scaling line geometry with a tube (visual hint)
        const thicknessBase = loading > 100 ? 0.08 : loading > 80 ? 0.06 : 0.04;
        const thickness = isScenarioAffected ? thicknessBase + scenarioSeverity * 0.04 : thicknessBase;
        lines[i].line.scale.set(1, 1, thickness);
      });

      const multText = (typeof fleet_multiplier === "number") ? fleet_multiplier.toFixed(2) : "n/a";
      statsEl.textContent = `Time: ${timestamp} | Scenario: ${scenario || "-"} | Fleet x${multText} | Min V: ${stats.min_vm.toFixed(3)} | Max V: ${stats.max_vm.toFixed(3)} | Max Loading: ${stats.max_line_loading.toFixed(1)}%`;
      // Dashboard-like live KPIs for presentation consistency.
      freqValueEl.textContent = `${(50.0 - Math.max(0, stats.max_line_loading - 80) * 0.002).toFixed(2)} Hz`;
      pvValueEl.textContent = `${(3.0 * Math.max(0.2, Math.min(1.0, stats.max_vm))).toFixed(1)} MW`;
      busValueEl.textContent = `${buses.length}`;
      peakValueEl.textContent = `${stats.max_line_loading.toFixed(1)}%`;
      const isNormal = stats.max_line_loading < 80 && stats.min_vm >= 0.97 && stats.max_vm <= 1.05;
      statusValueEl.textContent = isNormal ? "NORMAL" : "ALERT";
      statusValueEl.style.color = isNormal ? "#34d399" : "#f97316";
      const risk = estimateRisk(stats);
      riskBadgeEl.textContent = risk.label;
      riskBadgeEl.style.background = risk.bg;
      riskBadgeEl.style.color = risk.fg;
      // Scenario visual intensity used in animation pulse.
      attackVisualIntensity = scenarioSeverity;
      updateTrend(stats.max_line_loading);
      lastPayload = payload;
    }

    function connect() {
      const url = document.getElementById('wsUrl').value.trim();
      if (!url) {
        statsEl.textContent = "Missing WebSocket URL";
        return;
      }

      manualDisconnect = false;
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }

      // Avoid duplicate connections if the user clicks multiple times.
      if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
        return;
      }

      statsEl.textContent = `Connecting... (${url})`;
      socket = new WebSocket(url);

      socket.onopen = () => {
        reconnectAttempts = 0;
        statsEl.textContent = "Connected";
      };

      socket.onerror = (event) => {
        // Browsers don't provide detailed error reason on 'error' reliably; console will help.
        console.error("WebSocket error:", event);
        statsEl.textContent = "WebSocket error (check DevTools console)";
      };

      socket.onclose = (event) => {
        const reason = event && event.reason ? `: ${event.reason}` : "";
        statsEl.textContent = `Disconnected (code ${event.code}${reason})`;

        if (!manualDisconnect) {
          reconnectAttempts += 1;
          const delayMs = Math.min(10000, 500 + reconnectAttempts * 1000);
          reconnectTimer = setTimeout(connect, delayMs);
        }
      };

      socket.onmessage = (event) => {
        try {
          const payload = JSON.parse(event.data);
          // Ignore non-simulation messages.
          if (payload && payload.type && (payload.type === "info" || payload.type === "error")) {
            updateGrid(payload); // will show a meaningful message via guard above
            return;
          }
          updateGrid(payload);
        } catch (e) {
          console.error("Invalid WS payload:", e, event.data);
        }
      };
    }

    document.getElementById('connectBtn').onclick = connect;
    document.getElementById('setScenario').onclick = () => {
      if (!socket || socket.readyState !== 1) return;
      const sc = document.getElementById('scenario').value;
      socket.send(JSON.stringify({ type: "set_scenario", scenario: sc }));
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Auto-fill WS from query and connect
    const preset = getWsFromQuery();
    if (preset) {
      document.getElementById('wsUrl').value = preset;
      connect();
    }

    function animate() {
      requestAnimationFrame(animate);
      tick += 0.01;
      // Flash effect during attack
      if (lastPayload && lastPayload.attack_applied) {
        const pulse = (Math.sin(tick * 20) + 1) / 2;
        const sat = 45 + attackVisualIntensity * 35;
        const light = 16 + pulse * (12 + attackVisualIntensity * 20);
        scene.background = new THREE.Color(`hsl(0, ${sat}%, ${light}%)`);
      } else {
        scene.background = new THREE.Color(0x0a0e27);
      }
      // animate flow markers along lines
      lines.forEach(l => {
        const speed = Math.min(0.02 + (l.load / 200) * 0.05, 0.08);
        const t = (tick * speed + l.phase) % 1;
        const x = l.a.x + (l.b.x - l.a.x) * t;
        const z = l.a.z + (l.b.z - l.a.z) * t;
        l.marker.position.set(x, 0.05, z);
      });
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
