services:
  - type: web
    name: 2asicya-realtime
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    # Use `python -m uvicorn` to avoid issues where the `uvicorn` executable
    # is not on PATH in Render environments.
    startCommand: "python -m uvicorn backend.app:app --host 0.0.0.0 --port $PORT"
